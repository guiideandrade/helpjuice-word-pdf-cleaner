<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helpjuice Word Cleaner Pro v2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ── Base ── */
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #1e1e29; color: #fff; margin: 0; padding: 0;
}
.container { max-width: 1200px; margin: 30px auto; background: #23233a; border-radius: 12px; box-shadow: 0 5px 30px #0005; padding: 30px; }

/* ── Header ── */
.header h1 { color: #4f9cff; margin: 0; font-size: 1.9rem; }
.header p  { color: #bbb; margin-bottom: 24px; font-size: 1rem; }

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 22px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } .container { padding: 20px; } }

/* ── Textareas ── */
textarea {
  width: 100%; min-height: 320px; background: #131321;
  border-radius: 7px; border: 2px solid #324377; color: #e6ebfa;
  padding: 12px; font-family: 'Consolas', monospace; font-size: 13px;
  resize: vertical; line-height: 1.5;
}
textarea.raw { background: #0b0b18; border-color: #4a5568; color: #cbd5e0; }

/* ── Labels / badges ── */
.response-label {
  color: #7ba5fa; font-size: 13px; margin-bottom: 6px;
  font-weight: 600; display: flex; justify-content: space-between; align-items: center;
}
.badge { background: #7c3aed; color: #fff; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; }

/* ── Buttons ── */
.btn {
  border: none; border-radius: 7px; padding: 8px 20px; color: #fff;
  background: #4f9cff; font-weight: 600; font-size: 14px; cursor: pointer;
  margin-right: 8px; margin-top: 8px; transition: background 0.2s;
}
.btn.success  { background: #10b981; }
.btn.secondary{ background: #6b7280; }
.btn.warn     { background: #f59e0b; }
.btn:hover         { background: #3474d1; }
.btn.success:hover { background: #0c8e63; }
.btn.secondary:hover{ background: #4b5563; }
.btn.warn:hover    { background: #d97706; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Alert ── */
.alert { padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; color: #fff; font-weight: 500; font-size: 13px; }
.alert.success { background: #10b981; }
.alert.error   { background: #ef4444; }
.alert.info    { background: #3b82f6; }
.hidden { display: none; }

/* ── Report panel ── */
#report-panel {
  margin-bottom: 20px; border-radius: 8px; border: 1px solid #324377;
  background: #1a1a2e; overflow: hidden;
}
#report-panel.has-high  { border-color: #ef4444; }
#report-panel.has-medium{ border-color: #f59e0b; }
#report-panel.clean     { border-color: #10b981; }

.report-summary {
  padding: 12px 16px; background: #2a2a45; font-size: 13px;
  border-bottom: 1px solid #324377;
}

.report-section { padding: 10px 16px; font-size: 13px; }
.report-section summary {
  cursor: pointer; color: #7ba5fa; font-weight: 600; padding: 4px 0;
  list-style: none; user-select: none;
}
.report-section summary::-webkit-details-marker { display: none; }
.report-section summary::before { content: '▶ '; font-size: 10px; }
details[open] > summary::before { content: '▼ '; }

.report-log { margin: 8px 0 4px; padding-left: 16px; }
.report-log li { margin-bottom: 6px; line-height: 1.4; }
.report-pass-name   { color: #a5b4fc; }
.report-pass-count  { color: #6b7280; font-size: 12px; }
.report-pass-detail { color: #9ca3af; font-size: 11px; }

.report-finding {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid #2a2a45; flex-wrap: wrap;
}
.report-finding:last-child { border-bottom: none; }
.report-sev {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
  color: #fff; flex-shrink: 0;
}
.report-cat-icon { font-size: 14px; flex-shrink: 0; }
.report-finding-msg { flex: 1; color: #e2e8f0; font-size: 13px; }
.report-fix-btn {
  border: none; background: #1d4ed8; color: #fff; border-radius: 5px;
  padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
  transition: background 0.15s; flex-shrink: 0;
}
.report-fix-btn:hover { background: #1e40af; }
.report-fix-group { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; }
.report-input {
  background: #131321; border: 1px solid #4a5568; border-radius: 5px;
  color: #e6ebfa; padding: 3px 8px; font-size: 12px; flex: 1; min-width: 160px;
}
.report-input:focus { outline: none; border-color: #4f9cff; }

/* ── Footer ── */
.footer {
  text-align: center; padding: 14px 10px 4px; margin-top: 18px;
  color: #7ba5fa; font-size: 12px; border-top: 2px solid #324377;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧹 Helpjuice Word Cleaner Pro</h1>
    <p>v2.0 — transform + validate + report pipeline. Paste Word/PDF HTML; get clean, SEO-checked output.</p>
  </div>

  <div class="grid-2">
    <div>
      <div class="response-label">
        <span>📥 RAW HTML Input</span>
        <span class="badge">WORD / PDF</span>
      </div>
      <textarea id="raw-html" class="raw" placeholder="Paste HTML from Word/PDF..."></textarea>
      <button class="btn success" id="btn-copy-raw">📋 Copy Raw</button>
      <button class="btn secondary" id="btn-clear">🗑️ Clear</button>
    </div>
    <div>
      <div class="response-label">
        <span>✨ Cleaned HTML</span>
        <span class="badge">HELPJUICE</span>
      </div>
      <textarea id="output-html" readonly placeholder="Cleaned HTML will appear here..."></textarea>
      <button class="btn success" id="btn-copy-clean">📋 Copy Clean</button>
    </div>
  </div>

  <div id="alert" class="alert hidden"></div>
  <div id="report-panel" class="hidden"></div>

  <div class="footer">
    v2.0 — transform + validate + report pipeline
    <br>Built on Helpjuice Word Cleaner v1 by Kenan Sehovic
  </div>
</div>

<script type="module">
import { runPipeline } from './src/pipeline.js';
import { renderReport, shouldGateCopy, confirmCopyGate } from './src/report.js';

// ── State ────────────────────────────────────────────────────────────────────
let lastResult = null; // { html, transforms, findings, doc }

// ── DOM refs ─────────────────────────────────────────────────────────────────
const rawArea    = document.getElementById('raw-html');
const outputArea = document.getElementById('output-html');
const alertEl    = document.getElementById('alert');
const reportEl   = document.getElementById('report-panel');
const btnCopyRaw   = document.getElementById('btn-copy-raw');
const btnCopyClean = document.getElementById('btn-copy-clean');
const btnClear     = document.getElementById('btn-clear');

// ── Alert helpers ─────────────────────────────────────────────────────────────
function showAlert(msg, type = 'info') {
  alertEl.textContent = msg;
  alertEl.className = `alert ${type}`;
  setTimeout(() => alertEl.classList.add('hidden'), 4000);
}
function hideAlert() { alertEl.className = 'alert hidden'; }

// ── Clean ────────────────────────────────────────────────────────────────────
function clean() {
  const html = rawArea.value;
  if (!html.trim()) { showAlert('No HTML to clean.', 'error'); return; }
  hideAlert();

  try {
    lastResult = runPipeline(html);
    outputArea.value = lastResult.html;
    refreshReport();
    const issueCount = lastResult.findings.length;
    showAlert(
      issueCount === 0
        ? '✅ Cleaned — no issues found.'
        : `✅ Cleaned — ${issueCount} issue(s) found. See report below.`,
      issueCount === 0 ? 'success' : 'info'
    );
  } catch (err) {
    console.error(err);
    showAlert('❌ Error: ' + err.message, 'error');
  }
}

// ── Report ───────────────────────────────────────────────────────────────────
function refreshReport() {
  if (!lastResult) return;
  const { transforms, findings, doc } = lastResult;
  reportEl.classList.remove('hidden', 'has-high', 'has-medium', 'clean');

  renderReport(reportEl, {
    transforms,
    findings,
    doc,
    onFixed: () => {
      // After an auto-fix: re-serialize the DOM and update the output textarea
      lastResult.html = doc.body.innerHTML.trim();
      outputArea.value = lastResult.html;
      // Re-run validation to update findings list
      import('./src/validators.js').then(({ validate }) => {
        lastResult.findings = validate(doc);
        refreshReport();
      });
    },
  });

  // Border color hint
  if (findings.some(f => f.severity === 'high'))   reportEl.classList.add('has-high');
  else if (findings.some(f => f.severity === 'medium')) reportEl.classList.add('has-medium');
  else reportEl.classList.add('clean');
}

// ── Copy ──────────────────────────────────────────────────────────────────────
function copyText(text, btn) {
  if (!text) { showAlert('Nothing to copy.', 'error'); return; }
  const doNotify = () => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied!';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(doNotify, () => fallbackCopy(text, doNotify));
  } else {
    fallbackCopy(text, doNotify);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  cb?.();
}

// ── Bindings ──────────────────────────────────────────────────────────────────
btnCopyRaw.addEventListener('click', () => copyText(rawArea.value, btnCopyRaw));

btnCopyClean.addEventListener('click', () => {
  if (!outputArea.value) { showAlert('Nothing to copy.', 'error'); return; }
  if (lastResult && shouldGateCopy(lastResult.findings)) {
    if (!confirmCopyGate(lastResult.findings)) return;
  }
  copyText(outputArea.value, btnCopyClean);
});

btnClear.addEventListener('click', () => {
  rawArea.value = '';
  outputArea.value = '';
  reportEl.className = 'hidden';
  reportEl.innerHTML = '';
  lastResult = null;
  hideAlert();
});

// Auto-clean on paste
rawArea.addEventListener('paste', e => {
  e.preventDefault();
  hideAlert();
  try {
    const cd = e.clipboardData || window.clipboardData;
    const htmlData = cd.getData('text/html');
    const textData = cd.getData('text/plain');
    const full = (htmlData && htmlData.trim()) ? htmlData : textData;
    if (full) {
      rawArea.value = full;
      setTimeout(clean, 120);
    }
  } catch (err) {
    console.error('Paste error:', err);
    showAlert('Paste operation failed.', 'error');
  }
});
</script>
</body>
</html>
